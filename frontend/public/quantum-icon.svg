<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e1a4" />
      <stop offset="50%" stop-color="#cba23a" />
      <stop offset="100%" stop-color="#8a6d25" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="120" height="120" rx="24" fill="#080806" />
  <rect width="120" height="120" rx="24" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4" />
  
  <!-- Elegant Serif Q -->
  <text 
    x="50%" 
    y="55%" 
    font-family="Georgia, serif" 
    font-size="68" 
    font-style="italic" 
    font-weight="bold" 
    fill="url(#gold)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    filter="url(#glow)"
  >Q</text>
</svg>
